<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>SonicCore BGM版权检测</title>
  <style>
    body{font-family:system-ui,sans-serif;background:#0a0a1a;color:#e2e8f0;margin:0;padding:20px}
    h1{text-align:center;color:#818cf8}
    .card{background:#111128;border:1px solid rgba(99,102,241,0.15);border-radius:14px;padding:20px;max-width:600px;margin:20px auto}
    .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:bold}
    .btn-primary{background:#6366f1;color:#fff}
    .tab{background:transparent;border:1px solid #333;padding:8px 16px;color:#64748b;cursor:pointer}
    .tab.active{background:#6366f1;color:#fff}
    #tabUrl{display:block}#tabManual{display:none}
    #tabUrl.hidden{display:none}#tabManual.hidden{display:block}
    input,select{width:100%;padding:10px;margin:5px 0;background:rgba(255,255,255,0.1);border:1px solid #333;color:#fff;border-radius:6px}
    .rbox{margin-top:20px;padding:15px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.4);border-radius:10px}
  </style>
</head>
<body>
  <h1>SonicCore BGM 版权检测</h1>
  <div class="card">
    <div style="margin-bottom:15px">
      <button class="tab active" id="tabBtnUrl" onclick="sTab('url')">视频URL</button>
      <button class="tab" id="tabBtnMan" onclick="sTab('manual')">手动输入</button>
    </div>
    <div id="tabUrl">
      <input type="text" id="audioUrl" placeholder="视频URL">
      <input type="text" id="knownTitle" placeholder="歌曲名称（可选）">
      <input type="text" id="knownArtist" placeholder="艺术家（可选）">
    </div>
    <div id="tabManual">
      <input type="text" id="manualTitle" placeholder="歌曲名称 *">
      <input type="text" id="manualArtist" placeholder="艺术家">
    </div>
    <select id="usageType" style="margin-top:10px">
      <option value="short_form">短视频</option>
      <option value="drama">出海短剧</option>
      <option value="ad">广告</option>
    </select>
    <select id="targetMarket">
      <option value="global">全球</option>
      <option value="southeast_asia">东南亚</option>
      <option value="china">中国</option>
    </select>
    <button class="btn btn-primary" style="margin-top:15px" onclick="submitD()">开始检测</button>
    <div id="rArea"></div>
  </div>
  <script>
    var API = 'https://soniccore-mvp.onrender.com';
    function sTab(t) {
      document.getElementById('tabBtnUrl').classList.toggle('active', t === 'url');
      document.getElementById('tabBtnMan').classList.toggle('active', t === 'manual');
      document.getElementById('tabUrl').classList.toggle('hidden', t !== 'url');
      document.getElementById('tabManual').classList.toggle('hidden', t !== 'manual');
    }
    async function submitD() {
      var isUrl = document.getElementById('tabUrl').style.display !== 'none';
      var p = { usageType: document.getElementById('usageType').value, targetMarket: document.getElementById('targetMarket').value };
      if (isUrl) { p.title = document.getElementById('knownTitle').value; p.artist = document.getElementById('knownArtist').value; }
      else { p.title = document.getElementById('manualTitle').value; p.artist = document.getElementById('manualArtist').value; }
      if (!p.title) { alert('请填写歌曲名称'); return; }
      document.getElementById('rArea').innerHTML = '<div class="rbox">正在检测...</div>';
      try {
        var r = await fetch(API + '/api/identify', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(p) });
        var d = await r.json();
        var song = d.result || {}; var cp = d.copyright || {}; var risk = cp.risk || 'MEDIUM';
        var rt = {LOW:'低风险',MEDIUM:'中风险',HIGH:'高风险'}[risk];
        document.getElementById('rArea').innerHTML = '<div class="rbox">✅ ' + rt + ' - ' + (song.title || p.title) + '</div>';
      } catch (e) { document.getElementById('rArea').innerHTML = '<div class="rbox">错误: ' + e.message + '</div>'; }
    }
  </script>
</body>
</html>
